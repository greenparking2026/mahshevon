<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Parking - מחשבון חניונים</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0fdf4; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .calculator-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(34, 139, 34, 0.15); width: 100%; max-width: 500px; border-top: 8px solid #2e7d32; }
        h2 { color: #1b5e20; margin-bottom: 25px; font-size: 28px; text-align: center; line-height: 1.1; font-weight: bold; }
        .sub-title { font-size: 18px; display: block; margin-top: 5px; font-weight: normal; color: #388e3c; }
        .input-group { margin-bottom: 20px; text-align: right; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #388e3c; }
        select, input { width: 100%; padding: 12px; border: 2px solid #e8f5e9; border-radius: 10px; box-sizing: border-box; font-size: 16px; outline: none; transition: border-color 0.3s; }
        select:focus, input:focus { border-color: #66bb6a; }
        button { width: 100%; padding: 15px; background-color: #2e7d32; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; transition: background 0.3s; margin-top: 10px; }
        button:hover { background-color: #1b5e20; }
        #result { margin-top: 25px; padding: 20px; border-radius: 12px; font-weight: bold; display: none; line-height: 1.6; text-align: center; border: 1px solid #c8e6c9; background-color: #f1f8f1; }
        .price-display { color: #2e7d32; font-size: 34px; display: block; margin-bottom: 10px; }
        .time-display { color: #555; font-size: 16px; font-weight: normal; border-top: 1px solid #c8e6c9; padding-top: 10px; margin-top: 10px; }
        .clock-footer { font-size: 15px; color: #2e7d32; margin-top: 25px; border-top: 1px solid #eee; padding-top: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="calculator-card">
    <h2>Green Parking<br><span class="sub-title">מחשבון עלות חניון</span></h2>
    
    <div class="input-group">
        <label for="parkingLot">בחר חניון:</label>
        <select id="parkingLot">
            <option value="" disabled selected>-- בחר חניון מהרשימה --</option>
            <option value="oasis">אואזיס</option>
            <option value="bezrano">בז'רנו</option>
            <option value="gaon">בית גאון</option>
            <option value="bloomfield">בלומפילד</option>
            <option value="ben_yehuda">בן יהודה</option>
            <option value="bar_kochva">בר כוכבא</option>
            <option value="gav_yam">גב ים חולון</option>
            <option value="gibor">גיבור ספורט</option>
            <option value="ginat">גינת השרון</option>
            <option value="hakimi">דוד חכמי 16</option>
            <option value="opera">האופרה</option>
            <option value="boursa">הבורסה</option>
            <option value="haduvdevan">הדובדבן קרית אונו</option>
            <option value="hamasgar">המסגר</option>
            <option value="yerushalayim">ירושלים</option>
            <option value="klal">כלל</option>
            <option value="lev_hapark">לב הפארק</option>
            <option value="lloyd">לויד ג'ורג'</option>
            <option value="city_givatayim">סיטי גבעתיים</option>
            <option value="ein_yaakov">עין יעקב</option>
            <option value="elite">צומת עלית</option>
            <option value="karlibach">קרליבך</option>
            <option value="stampfer">שטמפפר</option>
            <option value="talmi">תלמי</option>
        </select>
    </div>

    <div class="input-group">
        <label for="entryTime">זמן כניסה לחניון:</label>
        <input type="datetime-local" id="entryTime">
    </div>

    <button onclick="calculateTotal()">חשב עלות וזמן שהייה</button>

    <div id="result"></div>

    <div class="clock-footer" id="liveClock">טוען שעה נוכחית...</div>
</div>

<script>
    // פונקציית שעון מעודכנת
    function startClock() {
        const update = () => {
            const now = new Date();
            const timeStr = now.toLocaleString('he-IL', { dateStyle: 'short', timeStyle: 'medium' });
            document.getElementById('liveClock').innerText = `שעה נוכחית: ${timeStr}`;
        };
        setInterval(update, 1000);
        update();
    }
    document.addEventListener('DOMContentLoaded', startClock);

    // נתוני המחירונים מהמקורות
    const parkingData = {
        klal: { type: 'tiered', tiers: [{m: 30, r: 0.6}, {m: 180, r: 0.5}], max: 93, evening: {start: 19, rate: 0.35, max: 50} },
        ginat: { type: 'tiered', tiers: [{m: 30, r: 0.6}, {m: 180, r: 0.5}], max: 93, evening: {start: 19, rate: 0.35, max: 50} },
        hamasgar: { type: 'hourly', first: 20, extra15: 6, max: 50 },
        lloyd: { type: 'tiered', tiers: [{m: 30, r: 0.5}, {m: 180, r: 0.4}, {m: 240, r: 0.2}], max: 87 },
        talmi: { type: 'tiered', tiers: [{m: 60, r: 0.35}, {m: 180, r: 0.4}, {m: 240, r: 0.3}], max: 87, evening: {start: 19, rate: 0.35, max: 50} },
        karlibach: { type: 'hourly', first: 22, extra15: 7, max: 80 },
        gibor: { type: 'hourly', first: 30, extra15: 7, max: 93 },
        oasis: { type: 'tiered', tiers: [{m: 180, r: 0.4}], max: 72 },
        stampfer: { type: 'tiered', tiers: [{m: 60, r: 0.45}, {m: 180, r: 0.4}], max: 75 },
        yerushalayim: { type: 'hourly', first: 18, extra15: 6, max: 64 },
        elite: { type: 'tiered', tiers: [{m: 60, r: 0.35}, {m: 180, r: 0.4}], max: 69 },
        bloomfield: { type: 'tiered', tiers: [{m: 120, r: 0.35}, {m: 180, r: 0.2}], max: 54 },
        bar_kochva: { type: 'hourly', first: 17, extra15: 6, max: 80 },
        hakimi: { type: 'tiered', tiers: [{m: 180, r: 0.4}], max: 81 },
        gaon: { type: 'hourly', first: 18, extra15: 6, max: 64, weekendRate: 40 },
        lev_hapark: { type: 'tiered', tiers: [{m: 30, r: 0.4}, {m: 60, r: 0.25}, {m: 120, r: 0.3}, {m: 180, r: 0.2}], max: 49.5 },
        ben_yehuda: { type: 'tiered', tiers: [{m: 180, r: 0.45}, {m: 240, r: 0.35}], max: 90 },
        ein_yaakov: { type: 'tiered', tiers: [{m: 180, r: 0.25}, {m: 220, r: 0.25}], max: 55 },
        bezrano: { type: 'hourly', first: 18, extra15: 7, max: 67 },
        opera: { type: 'tiered', tiers: [{m: 240, r: 0.5}], max: 120 },
        boursa: { type: 'special' },
        gav_yam: { type: 'tiered', tiers: [{m: 60, r: 0.45}, {m: 200, r: 0.45}], max: 80 },
        city_givatayim: { type: 'tiered', tiers: [{m: 200, r: 0.45}], max: 90 },
        haduvdevan: { type: 'tiered', tiers: [{m: 120, r: 0.35}, {m: 180, r: 0.3}], max: 60 }
    };

    function calculateTotal() {
        const lotId = document.getElementById('parkingLot').value;
        const entryStr = document.getElementById('entryTime').value;
        const resultDiv = document.getElementById('result');

        if (!lotId || !entryStr) { alert("אנא בחר חניון והזן שעת כניסה"); return; }

        const initialEntry = new Date(entryStr);
        let current = new Date(initialEntry);
        const now = new Date();
        if (current > now) { alert("זמן הכניסה לא יכול להיות בעתיד"); return; }

        let totalCost = 0;
        const data = parkingData[lotId];

        while (current < now) {
            let nextCycle = new Date(current);
            nextCycle.setHours(6, 0, 0, 0);
            if (nextCycle <= current) nextCycle.setDate(nextCycle.getDate() + 1);
            
            let segmentEnd = new Date(Math.min(now, nextCycle));
            let mins = Math.floor((segmentEnd - current) / 60000);
            let dayOfWeek = current.getDay(); 
            let segmentCost = 0;

            if (lotId === 'boursa') {
                if (dayOfWeek === 5 || dayOfWeek === 6) {
                    segmentCost = Math.min(mins * 0.35, 35);
                } else {
                    let dayLimit = new Date(current);
                    dayLimit.setHours(16, 0, 0, 0);
                    let dayMins = 0, eveningMins = 0;
                    if (current < dayLimit) {
                        dayMins = Math.floor((Math.min(segmentEnd, dayLimit) - current) / 60000);
                        eveningMins = Math.floor((segmentEnd - Math.max(current, dayLimit)) / 60000);
                    } else { eveningMins = mins; }
                    
                    let dayPartCost = 0;
                    if (dayMins > 0) {
                        if (dayMins <= 30) dayPartCost = dayMins * 0.55;
                        else if (dayMins <= 60) dayPartCost = (30 * 0.55) + (dayMins - 30) * 0.45;
                        else dayPartCost = (30 * 0.55) + (30 * 0.45) + (dayMins - 60) * 0.55;
                    }
                    let eveningPartCost = (eveningMins > 0) ? (eveningMins * 0.35) : 0;
                    
                    // תיקון: תקרה אחת לכל הסבב (92 אם נכנס ביום, 35 אם בערב בלבד)
                    let currentMax = (current < dayLimit) ? 92 : 35;
                    segmentCost = Math.min(dayPartCost + eveningPartCost, currentMax);
                }
            } else if (lotId === 'gaon' && (dayOfWeek === 5 || dayOfWeek === 6)) {
                segmentCost = 40;
            } else if (data && data.evening && current.getHours() >= data.evening.start) {
                segmentCost = Math.min(mins * data.evening.rate, data.evening.max);
            } else if (data) {
                if (data.type === 'tiered') {
                    let rem = mins; let lastM = 0;
                    for (let t of data.tiers) {
                        let inT = Math.min(rem, t.m - lastM);
                        if (inT > 0) { segmentCost += inT * t.r; rem -= inT; lastM = t.m; }
                    }
                    if (rem > 0) segmentCost += rem * data.tiers[data.tiers.length - 1].r;
                } else if (data.type === 'hourly') {
                    segmentCost = (mins <= 60) ? data.first : data.first + (Math.ceil((mins - 60) / 15) * data.extra15);
                }
                segmentCost = Math.min(segmentCost, data.max);
            }
            totalCost += segmentCost;
            current = segmentEnd;
        }

        const totalMinutes = Math.floor((now - initialEntry) / 60000);
        const d = Math.floor(totalMinutes / 1440);
        const h = Math.floor((totalMinutes % 1440) / 60);
        const m = totalMinutes % 60;

        resultDiv.style.display = "block";
        resultDiv.innerHTML = `
            <div>סה"כ לתשלום:</div>
            <span class="price-display">${totalCost.toFixed(2)} ₪</span>
            <div class="time-display">שהייה: ${d} ימים, ${h} שעות ו-${m} דקות</div>
        `;
    }
</script>

</body>
</html>
